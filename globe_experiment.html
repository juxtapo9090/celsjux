<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Globe — celsjux</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'JetBrains Mono', monospace; }
  #container { width: 100vw; height: 100vh; position: relative; }
  .title {
    position: fixed; top: 24px; left: 28px; z-index: 10;
    text-transform: uppercase; letter-spacing: 0.2em;
    font-size: 10px; color: rgba(34,211,238,0.5);
  }
  .title strong {
    display: block; margin-top: 6px; font-size: 15px;
    letter-spacing: 0.06em; color: rgba(236,254,255,0.9);
    text-shadow: 0 0 20px rgba(34,211,238,0.3);
  }
  .info {
    position: fixed; right: 28px; bottom: 24px; z-index: 10;
    padding: 12px 16px; border: 1px solid rgba(34,211,238,0.15);
    border-radius: 12px; background: rgba(0,5,15,0.6);
    backdrop-filter: blur(12px); font-size: 11px;
    color: rgba(207,250,254,0.6);
  }
  .info span { color: #22d3ee; }
  .info .amber { color: #ffb36a; }
</style>
</head>
<body>
<div id="container"></div>
<div class="title">
  orbital signal map
  <strong>celsjux relay field</strong>
</div>
<div class="info">
  <span>celsjux</span> — mesh topology<br>
  <span>15</span> nodes · <span>10</span> routes<br>
  home: <span class="amber">Kuala Lumpur</span>
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<script>
(function() {
  // ── Load real data from globe.json, fallback to static ──
  fetch('data/globe.json')
    .then(r => r.ok ? r.json() : null)
    .then(data => initGlobe(data))
    .catch(() => initGlobe(null));

  function initGlobe(liveData) {

  // Build node data from live JSON or fallback
  var nodeData = [];
  var arcRoutes = [];

  if (liveData && liveData.nodes && liveData.nodes.length > 0) {
    // REAL DATA MODE 🌍
    var myNode = liveData.nodes.find(n => n.type === 'self');
    var hubNode = liveData.nodes.find(n => n.type === 'hub');

    liveData.nodes.forEach(function(n) {
      var mag = n.type === 'self' ? 0.8 :
                n.type === 'hub' ? 0.5 :
                n.type === 'claude' ? 0.4 :
                n.type === 'attacker' ? 0.3 :
                n.type === 'mesh' ? 0.35 : 0.2;
      nodeData.push(n.lat, n.lng, mag);

      // Arcs from self to everything
      if (myNode && n.ip !== myNode.ip) {
        arcRoutes.push([myNode.lat, myNode.lng, n.lat, n.lng, n.type]);
      }
    });

    // Update HUD
    var dotEl = document.getElementById('dot-count');
    var arcEl = document.getElementById('arc-count');
    if (dotEl) dotEl.textContent = liveData.nodes.length;
    if (arcEl) arcEl.textContent = arcRoutes.length;
  } else {
    // FALLBACK — static fake data
    nodeData = [
      3.14, 101.69, 0.8,
      1.35, 103.82, 0.35,
      35.68, 139.69, 0.3,
      37.77, -122.42, 0.3,
      51.51, -0.13, 0.28,
      45.32, 103.70, 0.5,
    ];
    arcRoutes = [
      [3.14, 101.69, 37.77, -122.42, 'claude'],
      [3.14, 101.69, 1.35, 103.82, 'mesh'],
      [3.14, 101.69, 51.51, -0.13, 'claude'],
    ];
  }

  // ── Shaders ──
  var earthShader = {
    vertexShader: `
      varying vec3 vNormal;
      varying vec2 vUv;
      void main() {
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        vNormal = normalize(normalMatrix * normal);
        vUv = uv;
      }
    `,
    fragmentShader: `
      uniform sampler2D uTexture;
      varying vec3 vNormal;
      varying vec2 vUv;
      void main() {
        vec3 diffuse = texture2D(uTexture, vUv).xyz * 0.3;
        float intensity = 1.05 - dot(vNormal, vec3(0.0, 0.0, 1.0));
        vec3 atmosphere = vec3(0.13, 0.83, 0.93) * pow(intensity, 3.0);
        gl_FragColor = vec4(diffuse + atmosphere, 1.0);
      }
    `
  };

  var atmosphereShader = {
    vertexShader: `
      varying vec3 vNormal;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      varying vec3 vNormal;
      void main() {
        float intensity = pow(0.75 - dot(vNormal, vec3(0, 0, 1.0)), 10.0);
        gl_FragColor = vec4(0.13, 0.83, 0.93, 1.0) * intensity;
      }
    `
  };

  // ── Scene setup ──
  var container = document.getElementById('container');
  var w = window.innerWidth, h = window.innerHeight;

  var camera = new THREE.PerspectiveCamera(30, w / h, 1, 10000);
  camera.position.z = 600;

  var scene = new THREE.Scene();
  var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(w, h);
  renderer.setClearColor(0x000000, 1);
  container.appendChild(renderer.domElement);

  // ── Earth sphere ──
  var earthGeom = new THREE.SphereGeometry(200, 40, 30);
  var earthTex = new THREE.TextureLoader().load('assets/world_dark.jpg');
  var earthMat = new THREE.ShaderMaterial({
    uniforms: { uTexture: { value: earthTex } },
    vertexShader: earthShader.vertexShader,
    fragmentShader: earthShader.fragmentShader
  });
  var earth = new THREE.Mesh(earthGeom, earthMat);
  earth.rotation.y = Math.PI;
  scene.add(earth);

  // ── Atmosphere glow ──
  var atmoMat = new THREE.ShaderMaterial({
    vertexShader: atmosphereShader.vertexShader,
    fragmentShader: atmosphereShader.fragmentShader,
    side: THREE.BackSide,
    blending: THREE.AdditiveBlending,
    transparent: true
  });
  var atmosphere = new THREE.Mesh(earthGeom.clone(), atmoMat);
  atmosphere.scale.set(1.12, 1.12, 1.12);
  scene.add(atmosphere);

  // ── Node dots (small glowing spheres, no tiang) ──
  for (var i = 0; i < nodeData.length; i += 3) {
    var lat = nodeData[i], lng = nodeData[i + 1], mag = nodeData[i + 2];
    var phi = (90 - lat) * Math.PI / 180;
    var theta = (180 - lng) * Math.PI / 180;
    var r = 201; // slightly above surface

    var dotGeom = new THREE.SphereGeometry(mag * 3, 12, 8);
    var dotMat = new THREE.MeshBasicMaterial({
      color: mag > 0.5 ? 0x22d3ee : 0x06b6d4,
      transparent: true,
      opacity: 0.9,
      blending: THREE.AdditiveBlending
    });
    var dot = new THREE.Mesh(dotGeom, dotMat);
    dot.position.x = r * Math.sin(phi) * Math.cos(theta);
    dot.position.y = r * Math.cos(phi);
    dot.position.z = r * Math.sin(phi) * Math.sin(theta);
    scene.add(dot);

    // Glow ring for major nodes
    if (mag > 0.3) {
      var ringGeom = new THREE.RingGeometry(mag * 4, mag * 5, 32);
      var ringMat = new THREE.MeshBasicMaterial({
        color: 0x22d3ee,
        transparent: true,
        opacity: 0.25,
        side: THREE.DoubleSide,
        blending: THREE.AdditiveBlending
      });
      var ring = new THREE.Mesh(ringGeom, ringMat);
      ring.position.copy(dot.position);
      ring.lookAt(new THREE.Vector3(0, 0, 0));
      scene.add(ring);
    }
  }

  // ── Arc routes built from real data above ──

  function latLngToVec3(lat, lng, radius) {
    var phi = (90 - lat) * Math.PI / 180;
    var theta = (180 - lng) * Math.PI / 180;
    return new THREE.Vector3(
      radius * Math.sin(phi) * Math.cos(theta),
      radius * Math.cos(phi),
      radius * Math.sin(phi) * Math.sin(theta)
    );
  }

  // ── Animated arcs — traveling pulse along curve 🚀 ──
  var animatedArcs = [];
  var ARC_POINTS = 80;
  var TRAIL_LENGTH = 20; // how many segments glow at once

  function createAnimatedArc(startLat, startLng, endLat, endLng, color, speed) {
    var start = latLngToVec3(startLat, startLng, 200);
    var end = latLngToVec3(endLat, endLng, 200);

    var mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
    var dist = start.distanceTo(end);
    mid.normalize().multiplyScalar(200 + dist * 0.4);

    var curve = new THREE.QuadraticBezierCurve3(start, mid, end);
    var points = curve.getPoints(ARC_POINTS);

    // Dim base arc (the path)
    var baseGeom = new THREE.BufferGeometry().setFromPoints(points);
    var baseMat = new THREE.LineBasicMaterial({
      color: color,
      transparent: true,
      opacity: 0.12,
      blending: THREE.AdditiveBlending
    });
    scene.add(new THREE.Line(baseGeom, baseMat));

    // Bright traveling head (the pulse)
    var arcObj = {
      points: points,
      color: new THREE.Color(color),
      head: 0,
      speed: speed || 0.4,
      line: null
    };

    var pulseGeom = new THREE.BufferGeometry();
    var pulseMat = new THREE.LineBasicMaterial({
      color: color,
      transparent: true,
      opacity: 0.85,
      blending: THREE.AdditiveBlending,
      linewidth: 2
    });
    arcObj.line = new THREE.Line(pulseGeom, pulseMat);
    scene.add(arcObj.line);

    animatedArcs.push(arcObj);
  }

  // Create arcs from real data — color by type
  var typeColors = {
    'claude': 0xf97316,    // orange — AI services
    'hub': 0x22d3ee,       // cyan — our infrastructure
    'mesh': 0x22d3ee,      // cyan — WireGuard peers
    'attacker': 0xff2222,  // red — enemies
    'self': 0xa855f7,      // purple — us
  };

  arcRoutes.forEach(function(route, i) {
    var color = typeColors[route[4]] || 0x22d3ee;
    var speed = 0.3 + Math.random() * 0.3;
    createAnimatedArc(route[0], route[1], route[2], route[3], color, speed);
  });

  // ── Mouse interaction ──
  var mouse = { x: 0, y: 0 }, mouseDown = { x: 0, y: 0 };
  var rotation = { x: Math.PI * 1.1, y: Math.PI / 6 };
  var target = { x: rotation.x, y: rotation.y };
  var targetDown = { x: 0, y: 0 };
  var distance = 950, distTarget = 950;
  var dragging = false;
  var autoRotate = true;

  container.addEventListener('mousedown', function(e) {
    e.preventDefault();
    dragging = true;
    autoRotate = false;
    mouseDown.x = -e.clientX;
    mouseDown.y = e.clientY;
    targetDown.x = target.x;
    targetDown.y = target.y;
  });
  window.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    mouse.x = -e.clientX;
    mouse.y = e.clientY;
    var z = distance / 1000;
    target.x = targetDown.x + (mouse.x - mouseDown.x) * 0.005 * z;
    target.y = targetDown.y + (mouse.y - mouseDown.y) * 0.005 * z;
    target.y = Math.max(-Math.PI/2, Math.min(Math.PI/2, target.y));
  });
  window.addEventListener('mouseup', function() { dragging = false; });

  container.addEventListener('wheel', function(e) {
    e.preventDefault();
    distTarget -= e.deltaY * 0.3;
    distTarget = Math.max(350, Math.min(900, distTarget));
  }, { passive: false });

  window.addEventListener('resize', function() {
    w = window.innerWidth; h = window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });

  // ── Animate ──
  function animate() {
    requestAnimationFrame(animate);

    if (autoRotate) target.x += 0.001;

    // Update arc pulses — traveling light along curves
    for (var ai = 0; ai < animatedArcs.length; ai++) {
      var arc = animatedArcs[ai];
      arc.head += arc.speed;
      if (arc.head > ARC_POINTS + TRAIL_LENGTH) arc.head = 0; // loop

      var startIdx = Math.max(0, Math.floor(arc.head) - TRAIL_LENGTH);
      var endIdx = Math.min(ARC_POINTS, Math.floor(arc.head));

      if (endIdx > startIdx) {
        var slice = arc.points.slice(startIdx, endIdx + 1);
        arc.line.geometry.dispose();
        arc.line.geometry = new THREE.BufferGeometry().setFromPoints(slice);
      }
    }

    rotation.x += (target.x - rotation.x) * 0.1;
    rotation.y += (target.y - rotation.y) * 0.1;
    distance += (distTarget - distance) * 0.3;

    camera.position.x = distance * Math.sin(rotation.x) * Math.cos(rotation.y);
    camera.position.y = distance * Math.sin(rotation.y);
    camera.position.z = distance * Math.cos(rotation.x) * Math.cos(rotation.y);
    camera.lookAt(scene.position);

    renderer.render(scene, camera);
  }
  animate();
  } // end initGlobe
})();
</script>
</body>
</html>
